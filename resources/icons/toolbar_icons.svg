<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 24" width="480" height="24">
  <!-- OpenSheet Toolbar Icon Sprite Sheet -->
  <!-- Each icon is 24x24 at positions x = (n-1)*24 -->

  <!-- new (0) -->
  <g transform="translate(0,0)">
    <rect x="4" y="2" width="12" height="16" rx="1" fill="none" stroke="currentColor" stroke-width="1.5"/>
    <polyline points="12,2 16,6 12,6" fill="none" stroke="currentColor" stroke-width="1.5"/>
    <line x1="7" y1="9" x2="14" y2="9" stroke="currentColor" stroke-width="1.2"/>
    <line x1="7" y1="12" x2="14" y2="12" stroke="currentColor" stroke-width="1.2"/>
    <line x1="7" y1="15" x2="11" y2="15" stroke="currentColor" stroke-width="1.2"/>
  </g>

  <!-- open (24) -->
  <g transform="translate(24,0)">
    <path d="M3,8 L3,19 L21,19 L21,10 L12,10 L10,8 Z" fill="none" stroke="currentColor" stroke-width="1.5"/>
    <path d="M6,10 L18,10" stroke="currentColor" stroke-width="1.2" stroke-dasharray="2,1"/>
  </g>

  <!-- save (48) -->
  <g transform="translate(48,0)">
    <rect x="3" y="3" width="18" height="18" rx="2" fill="none" stroke="currentColor" stroke-width="1.5"/>
    <rect x="7" y="3" width="10" height="6" rx="0" fill="none" stroke="currentColor" stroke-width="1.2"/>
    <rect x="5" y="13" width="14" height="6" rx="1" fill="none" stroke="currentColor" stroke-width="1.2"/>
    <line x1="9" y1="5" x2="13" y2="5" stroke="currentColor" stroke-width="1.2"/>
  </g>

  <!-- undo (72) -->
  <g transform="translate(72,0)">
    <path d="M6,9 L3,12 L6,15" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
    <path d="M3,12 C3,12 8,6 15,8 C19,9 21,13 19,17" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
  </g>

  <!-- redo (96) -->
  <g transform="translate(96,0)">
    <path d="M18,9 L21,12 L18,15" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
    <path d="M21,12 C21,12 16,6 9,8 C5,9 3,13 5,17" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
  </g>

  <!-- cut (120) -->
  <g transform="translate(120,0)">
    <circle cx="7" cy="17" r="3" fill="none" stroke="currentColor" stroke-width="1.5"/>
    <circle cx="17" cy="17" r="3" fill="none" stroke="currentColor" stroke-width="1.5"/>
    <line x1="12" y1="3" x2="8.5" y2="15" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="12" y1="3" x2="15.5" y2="15" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
  </g>

  <!-- copy (144) -->
  <g transform="translate(144,0)">
    <rect x="8" y="2" width="12" height="14" rx="1" fill="none" stroke="currentColor" stroke-width="1.5"/>
    <rect x="4" y="6" width="12" height="14" rx="1" fill="white" stroke="currentColor" stroke-width="1.5"/>
    <line x1="7" y1="11" x2="13" y2="11" stroke="currentColor" stroke-width="1.2"/>
    <line x1="7" y1="14" x2="13" y2="14" stroke="currentColor" stroke-width="1.2"/>
  </g>

  <!-- paste (168) -->
  <g transform="translate(168,0)">
    <rect x="6" y="6" width="14" height="16" rx="1" fill="none" stroke="currentColor" stroke-width="1.5"/>
    <rect x="9" y="3" width="8" height="5" rx="1" fill="none" stroke="currentColor" stroke-width="1.5"/>
    <line x1="9" y1="12" x2="17" y2="12" stroke="currentColor" stroke-width="1.2"/>
    <line x1="9" y1="15" x2="17" y2="15" stroke="currentColor" stroke-width="1.2"/>
    <line x1="9" y1="18" x2="14" y2="18" stroke="currentColor" stroke-width="1.2"/>
  </g>

  <!-- bold (192) -->
  <g transform="translate(192,0)">
    <text x="12" y="18" font-family="Georgia,serif" font-size="16" font-weight="bold" text-anchor="middle" fill="currentColor">B</text>
  </g>

  <!-- italic (216) -->
  <g transform="translate(216,0)">
    <text x="12" y="18" font-family="Georgia,serif" font-size="16" font-style="italic" text-anchor="middle" fill="currentColor">I</text>
  </g>

  <!-- underline (240) -->
  <g transform="translate(240,0)">
    <text x="12" y="16" font-family="Georgia,serif" font-size="14" text-anchor="middle" fill="currentColor">U</text>
    <line x1="5" y1="21" x2="19" y2="21" stroke="currentColor" stroke-width="1.5"/>
  </g>

  <!-- align-left (264) -->
  <g transform="translate(264,0)">
    <line x1="4" y1="7"  x2="20" y2="7"  stroke="currentColor" stroke-width="1.5"/>
    <line x1="4" y1="11" x2="16" y2="11" stroke="currentColor" stroke-width="1.5"/>
    <line x1="4" y1="15" x2="20" y2="15" stroke="currentColor" stroke-width="1.5"/>
    <line x1="4" y1="19" x2="13" y2="19" stroke="currentColor" stroke-width="1.5"/>
  </g>

  <!-- align-center (288) -->
  <g transform="translate(288,0)">
    <line x1="4" y1="7"  x2="20" y2="7"  stroke="currentColor" stroke-width="1.5"/>
    <line x1="7" y1="11" x2="17" y2="11" stroke="currentColor" stroke-width="1.5"/>
    <line x1="4" y1="15" x2="20" y2="15" stroke="currentColor" stroke-width="1.5"/>
    <line x1="7" y1="19" x2="17" y2="19" stroke="currentColor" stroke-width="1.5"/>
  </g>

  <!-- align-right (312) -->
  <g transform="translate(312,0)">
    <line x1="4" y1="7"  x2="20" y2="7"  stroke="currentColor" stroke-width="1.5"/>
    <line x1="8" y1="11" x2="20" y2="11" stroke="currentColor" stroke-width="1.5"/>
    <line x1="4" y1="15" x2="20" y2="15" stroke="currentColor" stroke-width="1.5"/>
    <line x1="11" y1="19" x2="20" y2="19" stroke="currentColor" stroke-width="1.5"/>
  </g>

  <!-- sort-az (336) -->
  <g transform="translate(336,0)">
    <text x="6" y="11" font-family="sans-serif" font-size="8" font-weight="bold" fill="currentColor">A</text>
    <text x="6" y="20" font-family="sans-serif" font-size="8" font-weight="bold" fill="currentColor">Z</text>
    <line x1="16" y1="4" x2="16" y2="20" stroke="currentColor" stroke-width="1.5"/>
    <polyline points="13,17 16,20 19,17" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
  </g>

  <!-- filter (360) -->
  <g transform="translate(360,0)">
    <polygon points="3,5 21,5 14,13 14,20 10,20 10,13" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
  </g>

  <!-- sum (384) -->
  <g transform="translate(384,0)">
    <text x="12" y="18" font-family="Georgia,serif" font-size="18" font-weight="bold" text-anchor="middle" fill="currentColor">Σ</text>
  </g>

  <!-- chart-bar (408) -->
  <g transform="translate(408,0)">
    <rect x="4"  y="14" width="4" height="7" fill="currentColor"/>
    <rect x="10" y="9"  width="4" height="12" fill="currentColor"/>
    <rect x="16" y="5"  width="4" height="16" fill="currentColor"/>
    <line x1="3" y1="21" x2="21" y2="21" stroke="currentColor" stroke-width="1.5"/>
    <line x1="3" y1="3"  x2="3"  y2="21" stroke="currentColor" stroke-width="1.5"/>
  </g>

  <!-- chart-line (432) -->
  <g transform="translate(432,0)">
    <polyline points="3,18 8,12 13,15 18,7 21,10" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    <line x1="3" y1="21" x2="21" y2="21" stroke="currentColor" stroke-width="1.5"/>
    <line x1="3" y1="3"  x2="3"  y2="21" stroke="currentColor" stroke-width="1.5"/>
  </g>

  <!-- chart-pie (456) -->
  <g transform="translate(456,0)">
    <circle cx="12" cy="12" r="9" fill="none" stroke="currentColor" stroke-width="1.5"/>
    <path d="M12,12 L12,3 A9,9 0 0,1 21,12 Z" fill="currentColor" opacity="0.6"/>
    <path d="M12,12 L21,12 A9,9 0 0,1 7,20 Z" fill="currentColor" opacity="0.3"/>
    <line x1="12" y1="12" x2="12" y2="3" stroke="currentColor" stroke-width="1.2"/>
    <line x1="12" y1="12" x2="21" y2="12" stroke="currentColor" stroke-width="1.2"/>
    <line x1="12" y1="12" x2="7"  y2="20" stroke="currentColor" stroke-width="1.2"/>
  </g>
</svg>
