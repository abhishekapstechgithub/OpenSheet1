name: Bug Report
description: File a bug report for OpenSheet
title: "[Bug]: "
labels: ["bug", "triage"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report!
        Please fill in as much detail as you can.

  - type: input
    id: version
    attributes:
      label: OpenSheet Version
      description: What version are you running?
      placeholder: "e.g. v1.0.0"
    validations:
      required: true

  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - Linux
        - Windows
        - macOS
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear description of what the bug is.
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to Reproduce
      placeholder: |
        1. Open OpenSheet
        2. Click on cell A1
        3. Type '=SUM(A2:A10)'
        4. Press Enter
        5. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened?
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / Screenshots
      description: |
        Paste any relevant log output or attach screenshots.
        Logs are in: `~/.local/share/OpenSheet/logs/` (Linux)
                     `%APPDATA%\OpenSheet\logs\` (Windows)
      render: text

  - type: input
    id: qt-version
    attributes:
      label: Qt Version
      placeholder: "e.g. Qt 6.6.3"

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I searched for existing issues before filing this one
          required: true
        - label: I can reliably reproduce this bug
          required: true
