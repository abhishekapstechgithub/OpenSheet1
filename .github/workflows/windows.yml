name: OpenSheet Windows Build

on:
  push:
    branches: [ main, develop, "feature/**", "fix/**" ]
  pull_request:
    branches: [ main, develop ]
  release:
    types: [ created ]
  workflow_dispatch:
    inputs:
      build_type:
        description: "Build type"
        required: false
        default: "Release"
        type: choice
        options: [ Release, Debug, RelWithDebInfo ]

env:
  QT_VERSION:  "6.6.3"
  QT_ARCH:     "win64_msvc2019_64"
  BUILD_TYPE:  ${{ github.event.inputs.build_type || 'Release' }}

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  build:
    name: "Build · Windows · MSVC 2022"
    runs-on: windows-2022
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Qt6 — only qtcharts is an optional module; everything else is in qt6-base
      - name: Install Qt6
        uses: jurplel/install-qt-action@v3
        with:
          version:          ${{ env.QT_VERSION }}
          host:             windows
          target:           desktop
          arch:             ${{ env.QT_ARCH }}
          modules:          "qtcharts"
          cache:            true
          cache-key-prefix: qt6-win

      # SQLite3 via vcpkg (provides unofficial::sqlite3::sqlite3)
      - name: Cache vcpkg
        uses: actions/cache@v4
        with:
          path: C:/vcpkg/installed
          key: vcpkg-sqlite3-${{ runner.os }}-v2

      - name: Install SQLite3
        shell: powershell
        run: |
          vcpkg integrate install
          vcpkg install sqlite3:x64-windows

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Safety: remove any stale FindXxx.cmake files from cmake/ that would
      # cause infinite recursion with vcpkg's find_package wrapper.
      - name: Remove stale cmake Find-modules
        shell: powershell
        run: |
          Get-ChildItem cmake -Filter "Find*.cmake" -ErrorAction SilentlyContinue |
            ForEach-Object { Remove-Item $_.FullName -Force; Write-Host "Removed: $($_.Name)" }
          Write-Host "cmake/ directory is clean."

      # IMPORTANT: Do NOT cache the build directory.
      # A stale CMakeCache.txt will preserve old source file paths from
      # previous CMakeLists versions and cause "Cannot find source file" errors.
      # CMake configure is fast (~30s); the cost is worth the reliability.

      - name: Configure CMake
        shell: powershell
        run: |
          # Delete any leftover build dir to guarantee a clean configure
          if (Test-Path build) { Remove-Item build -Recurse -Force }

          cmake -B build `
            -G "Visual Studio 17 2022" `
            -A x64 `
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} `
            -DCMAKE_TOOLCHAIN_FILE="C:/vcpkg/scripts/buildsystems/vcpkg.cmake" `
            -DVCPKG_TARGET_TRIPLET=x64-windows `
            -DOPENSHEET_BUILD_TESTS=ON `
            -DOPENSHEET_PYTHON_SUPPORT=ON

      - name: Build
        shell: powershell
        run: cmake --build build --config ${{ env.BUILD_TYPE }} --parallel

      - name: Run tests
        shell: powershell
        working-directory: build
        run: |
          ctest -C ${{ env.BUILD_TYPE }} --output-on-failure --timeout 120

      - name: Deploy Qt runtime
        shell: powershell
        run: |
          # exe is placed in bin/<config>/ relative to source root (CMAKE_RUNTIME_OUTPUT_DIRECTORY)
          $exePath = "bin\${{ env.BUILD_TYPE }}\opensheet.exe"
          if (-not (Test-Path $exePath)) { $exePath = "bin\opensheet.exe" }
          if (-not (Test-Path $exePath)) {
            Write-Error "Cannot find opensheet.exe - searched bin\Release\ and bin\"
            exit 1
          }
          Write-Host "Deploying: $exePath"
          & "$env:Qt6_DIR\bin\windeployqt.exe" `
              --$("${{ env.BUILD_TYPE }}".ToLower()) `
              --no-translations `
              --no-system-d3d-compiler `
              "$exePath"

      - name: Stage distribution
        shell: powershell
        run: |
          $dist = "OpenSheet-dist"
          New-Item -ItemType Directory -Force -Path $dist | Out-Null
          # CMAKE_RUNTIME_OUTPUT_DIRECTORY is set to ${CMAKE_SOURCE_DIR}/bin
          $binDir = "bin\${{ env.BUILD_TYPE }}"
          if (-not (Test-Path $binDir)) { $binDir = "bin" }
          Copy-Item -Recurse "$binDir\*" "$dist\" -ErrorAction SilentlyContinue
          foreach ($dir in @("themes","localization","addons","config","resources")) {
            if (Test-Path $dir) { Copy-Item -Recurse $dir "$dist\$dir" }
          }

      - name: Create ZIP
        shell: powershell
        run: |
          $tag = "${{ github.ref_name }}"
          $zip = "OpenSheet-$tag-windows-x64.zip"
          Compress-Archive -Path "OpenSheet-dist\*" -DestinationPath $zip
          Write-Host "Created: $zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: opensheet-windows-x64-${{ github.sha }}
          path: OpenSheet-dist\
          retention-days: 30

      - name: Upload ZIP
        uses: actions/upload-artifact@v4
        with:
          name: opensheet-windows-x64-zip
          path: "OpenSheet-*-windows-x64.zip"
          retention-days: 30

  release:
    name: "Publish Release"
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'release'
    timeout-minutes: 10

    steps:
      - name: Download ZIP
        uses: actions/download-artifact@v4
        with:
          name: opensheet-windows-x64-zip
          path: release/

      - name: Checksum
        run: cd release && sha256sum *.zip > SHA256SUMS.txt && cat SHA256SUMS.txt

      - name: Attach to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/*.zip
            release/SHA256SUMS.txt
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
